<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Returning to Wallpaper Engine</title>
    <style>
      :root {
        color-scheme: dark;
        background: #090b0a;
        color: #f6f7f2;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(520px, calc(100% - 32px));
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }

      h1 {
        margin: 22px 0 10px;
        font-size: clamp(1.8rem, 8vw, 2.6rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #b8c4bd;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 24px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 0 16px;
        background: #49c384;
        color: #07110c;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img alt="" src="../../icon.svg" />
      <h1>Returning to Wallpaper Engine</h1>
      <p>If the app does not open automatically, use the button below.</p>
      <a id="open-app" href="wallpaper-engine://auth/callback">Open app</a>
    </main>
    <script>
      const callbackUrl = `wallpaper-engine://auth/callback${window.location.search}${window.location.hash}`;
      const openAppLink = document.getElementById("open-app");
      openAppLink.href = callbackUrl;
      window.location.replace(callbackUrl);
    </script>
  </body>
</html>
